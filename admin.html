<!DOCTYPE html>
<html>
<head>
<title>Users</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-10">

<h1 class="text-3xl mb-6">Registered Users</h1>

<table class="table-auto border border-gray-500 w-full text-center">

<tr class="bg-gray-700">
<th class="p-3">Email</th>
<th class="p-3">Action</th>
</tr>

{% for user in users %}

<tr class="border border-gray-600">
<td class="p-3">{{ user.email }}</td>

<td class="p-3">
<a href="/delete_user/{{ user.email }}"
class="bg-red-500 px-4 py-2 rounded hover:bg-red-700">
Delete
</a>
</td>

</tr>

{% endfor %}

</table>

  <!-- BACK TO HOME -->
  <div class="text-center mt-6">
    <a href="/" class="text-gray-400 hover:text-white text-lg font-bold">
      🏠Back to Home
    </a>
  </div>

</body>
</html>
